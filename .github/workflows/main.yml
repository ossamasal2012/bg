name: Build FuratTV APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── 3. Java (required by Android SDK) ────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 4. Install Capacitor + dependencies ──────────────────────────────────
      - name: Install dependencies
        run: |
          npm install -g @capacitor/cli
          npm init -y
          npm install @capacitor/core @capacitor/android

      # ── 5. Create Capacitor config ───────────────────────────────────────────
      - name: Create capacitor.config.json
        run: |
          cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.furattv.app",
            "appName": "FuratTV",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true,
              "captureInput": true,
              "webContentsDebuggingEnabled": false
            }
          }
          EOF

      # ── 6. Prepare www folder (web assets) ───────────────────────────────────
      - name: Prepare web assets
        run: |
          mkdir -p www
          # Copy index.html as main entry point
          cp index.html www/index.html
          # Copy JSON config files
          cp *.json www/ 2>/dev/null || true

      # ── 7. Add Android platform ───────────────────────────────────────────────
      - name: Add Android platform
        run: |
          npx cap add android

      # ── 8. Sync web assets into Android ──────────────────────────────────────
      - name: Sync Capacitor
        run: |
          npx cap sync android

      # ── 9. Customize Android App Name & Package ───────────────────────────────
      - name: Customize Android metadata
        run: |
          # App label in strings.xml
          sed -i 's|<string name="app_name">.*</string>|<string name="app_name">FuratTV</string>|g' \
            android/app/src/main/res/values/strings.xml || true

      # ── 10. Make Gradle executable ────────────────────────────────────────────
      - name: Grant Gradle execute permission
        run: chmod +x android/gradlew

      # ── 11. Build Debug APK ───────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}

      # ── 12. Upload APK artifact ───────────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FuratTV-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 13. (Optional) Create GitHub Release on tag push ─────────────────────
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/app-debug.apk
          name: FuratTV ${{ github.ref_name }}
          body: |
            ## FuratTV - إصدار ${{ github.ref_name }}
            تم بناء هذا الإصدار تلقائياً عبر GitHub Actions.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
